<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Credex Auth</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Auth.css">
  <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>

    <div class="container">

        <div class="left">

            <div class="logo">Credex</div>

            <form class="form active" id="loginForm">

            <h1>Welcome Back!</h1>
            <p class="subtitle">Sign in with your email and password.</p>

            <div class="input-box">
                <input type="email" placeholder="Email Address" required>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Password" required>
            </div>

            <div class="row">
                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit">Login</button>

            <div class="divider">or login with</div>

            <button type="button" class="social-btn">
                <i class="fa-brands fa-google"></i>
                Continue with Google
                </button>

                <button type="button" class="social-btn">
                <i class="fa-brands fa-facebook-f"></i>
                Continue with Facebook
                </button>

            <div class="switch">
                Don't have an account?
                <span onclick="switchForm()">Register Now</span>
            </div>

            </form>

            <form class="form" id="signupForm">

            <h1>Create Account</h1>
            <p class="subtitle">Join Credex and manage finances smarter.</p>

            <div class="input-box">
                <input type="text" placeholder="Full Name" required>
            </div>

            <div class="input-box">
                <input type="email" placeholder="Email Address" required>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Create Password" required>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Confirm Password" required>
            </div>

            <button type="submit">Create Account</button>

            <div class="switch">
                Already have an account?
                <span onclick="switchForm()">Login</span>
            </div>

            </form>

        </div>
        
            <div class="right">

                <div class="circle1"></div>
                <div class="circle2"></div>


            </div>

        </div>

        <script src="Auth.js"></script>
    </body>
</html>
